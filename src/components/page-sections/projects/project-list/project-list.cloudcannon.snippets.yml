featureGrid:
  template: mdx_component
  inline: false
  preview:
    text:
      - Feature Grid
    subtext:
      - key: heading
    icon: apps
  definitions:
    component_name: ProjectList
    named_args:
      - editor_key: eyebrow
        type: string
        optional: true
        remove_empty: true
      - editor_key: heading
        type: string
        optional: true
        remove_empty: true
      - editor_key: subtext
        type: string
        optional: true
        remove_empty: true
      - editor_key: projects
        type: array
      - editor_key: colorScheme
        type: string
        optional: true
        remove_empty: true
      - editor_key: backgroundColor
        type: string
        optional: true
        remove_empty: true
  _inputs_from_glob:
    - /src/components/page-sections/projects/project-list/project-list.cloudcannon.inputs.yml
